name: Gerar APK UP Entregas

on:
  push:
    branches: [ "main" ] # Dispara o build toda vez que você der push na main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalar Dependências e Plugins
        run: |
          npm install
          # Garante que todos os plugins de hardware (GPS, Camera, etc) estejam instalados
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor/geolocation @capacitor/camera @capacitor/haptics @capacitor/network @capacitor/device

      - name: Build do Projeto Web (Vite)
        run: npm run build

      - name: Configurar Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Sincronizar Capacitor Android
        run: |
          # Se a pasta android não existir no Git, ele cria agora
          npx cap add android || true
          npx cap sync android

      - name: Compilar APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: UP-Entregas-Piloto-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk