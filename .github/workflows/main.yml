name: Gerar APK Rodrigues
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Instalar Ferramentas e Dependencias
        run: |
          npm install
          # Instalando o motor do Capacitor explicitamente
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Gerar Pasta Dist (Build React)
        run: npm run build

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Criar Projeto Android e Sincronizar
        run: |
          # Comando para criar a pasta android se ela não existir
          npx cap add android || true
          npx cap sync android

      - name: Compilar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Baixar o APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: app-entregador-rodrigues
          path: android/app/build/outputs/apk/debug/app-debug.apk